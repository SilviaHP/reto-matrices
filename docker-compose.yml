services:

  api-go:
    build:
      context: ./api-go
      dockerfile: Dockerfile
    container_name: api-go
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - NODE_API_URL=http://api-node:3000   # hostname = nombre del servicio
    depends_on:
      - api-node
    networks:
      - matrices-net
    restart: on-failure

  api-node:
    build:
      context: ./api-node
      dockerfile: Dockerfile
    container_name: api-node
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
    networks:
      - matrices-net
    restart: on-failure

networks:
  matrices-net:
    driver: bridge
